services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edelweiss
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d edelweiss']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/edelweiss
      JWT_SECRET: local-dev-secret-change-me
      STORAGE_DIR: /data/uploads
      PORT: '3000'
      NODE_ENV: production
    volumes:
      - uploads:/data/uploads
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - '8080:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
