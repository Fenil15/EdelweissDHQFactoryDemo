# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Provisions:
#   - edelweiss-db        : managed Postgres
#   - edelweiss-backend   : Node web service (Express + TypeORM)
#   - edelweiss-frontend  : static site (Angular dist + SPA + /api rewrite)
#
# After first deploy, if Render assigns a backend hostname other than
# edelweiss-backend.onrender.com, update the rewrite `destination` below.

databases:
  - name: edelweiss-db
    plan: free
    databaseName: edelweiss
    user: edelweiss

services:
  - type: web
    name: edelweiss-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm ci && npm run build --workspace=apps/backend
    startCommand: node apps/backend/dist/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: '20'
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: edelweiss-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STORAGE_DIR
        value: /tmp/uploads
      # PORT is injected automatically by Render; backend reads process.env.PORT.

  - type: web
    name: edelweiss-frontend
    runtime: static
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build --workspace=apps/frontend -- --configuration=production
    staticPublishPath: apps/frontend/dist/frontend/browser
    pullRequestPreviewsEnabled: false
    autoDeploy: true
    routes:
      - type: rewrite
        source: /api/*
        destination: https://edelweiss-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
